run-name: "Export docs to registry (${{ inputs.environment }}) - ${{ inputs.version || github.run_id }}"
name: Export docs to registry

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target registry environment"
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      version:
        description: "Version tag (default: date-based YYYY.MM.DD)"
        required: false
        type: string
      include_images:
        description: "Include base64-encoded images in export"
        required: false
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  export-docs:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "20"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install gray-matter glob

      - name: Set version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(date +%Y.%m.%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build docs export
        id: build
        run: |
          node scripts/build-docs-export.js \
            --version "${{ steps.version.outputs.version }}" \
            --commit-sha "${{ github.sha }}" \
            --branch "${{ github.ref_name }}" \
            ${{ inputs.include_images == true && '--include-images' || '' }}

      - name: Report build summary
        run: |
          echo "## Docs Export Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ inputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Images included | \`${{ inputs.include_images }}\` |" >> "$GITHUB_STEP_SUMMARY"

          TARBALL_SIZE=$(stat -c%s dist/guardrails-docs.tar.gz 2>/dev/null || stat -f%z dist/guardrails-docs.tar.gz)
          echo "| Tarball size | $(numfmt --to=iec ${TARBALL_SIZE} 2>/dev/null || echo "${TARBALL_SIZE} bytes") |" >> "$GITHUB_STEP_SUMMARY"

      - name: Select role ARN
        id: role
        run: |
          case "${{ inputs.environment }}" in
            production)  echo "arn=${{ secrets.AWS_ROLE_ARN_PROD }}" >> "$GITHUB_OUTPUT" ;;
            staging)     echo "arn=${{ secrets.AWS_ROLE_ARN_STG }}"  >> "$GITHUB_OUTPUT" ;;
            development) echo "arn=${{ secrets.AWS_ROLE_ARN_DEV }}"  >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.role.outputs.arn }}
          aws-region: us-east-2

      - name: Upload to S3 (versioned)
        env:
          BUCKET: turbot-mod-repository-${{ inputs.environment }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          aws s3 cp dist/guardrails-docs.tar.gz \
            "s3://${BUCKET}/docs/${VERSION}/guardrails-docs.tar.gz"

      - name: Upload to S3 (latest)
        env:
          BUCKET: turbot-mod-repository-${{ inputs.environment }}
        run: |
          aws s3 cp dist/guardrails-docs.tar.gz \
            "s3://${BUCKET}/docs/latest/guardrails-docs.tar.gz"

      - name: Prune old versions (keep last 5)
        env:
          BUCKET: turbot-mod-repository-${{ inputs.environment }}
        run: |
          # List all version prefixes under docs/, excluding "latest/"
          VERSIONS=$(aws s3api list-objects-v2 \
            --bucket "${BUCKET}" \
            --prefix "docs/" \
            --delimiter "/" \
            --query "CommonPrefixes[].Prefix" \
            --output text | tr '\t' '\n' | grep -v 'latest' | sort -r)

          COUNT=0
          for PREFIX in ${VERSIONS}; do
            COUNT=$((COUNT + 1))
            if [ "${COUNT}" -gt 5 ]; then
              echo "Deleting old version: ${PREFIX}"
              aws s3 rm "s3://${BUCKET}/${PREFIX}" --recursive
            fi
          done

          echo "Kept $([ ${COUNT} -le 5 ] && echo ${COUNT} || echo 5) versions, deleted $([ ${COUNT} -gt 5 ] && echo $((COUNT - 5)) || echo 0)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: guardrails-docs-${{ steps.version.outputs.version }}
          path: dist/guardrails-docs.tar.gz
          retention-days: 30
