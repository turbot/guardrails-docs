run-name: "Export docs to registry (${{ inputs.environment || 'development' }}) - ${{ inputs.version || github.run_id }}"
name: Export docs to registry

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target registry environment"
        required: true
        type: choice
        options:
          - development
          - staging
          - production
          - all
      version:
        description: "Version override (default: auto from branch + tags)"
        required: false
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "20"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends webp

      - name: Install node dependencies
        run: npm install gray-matter glob

      - name: Resolve version
        id: version
        run: |
          # Use manual override if provided
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="${{ github.ref_name }}"

          # Derive major.minor from branch name
          if [ "$BRANCH" = "main" ]; then
            MAJOR_MINOR="5.57"
          elif echo "$BRANCH" | grep -qE '^v[0-9]+_[0-9]+_x$'; then
            MAJOR_MINOR=$(echo "$BRANCH" | sed 's/^v//;s/_x$//;s/_/./')
          else
            echo "version=$(date +%Y.%m.%d.%H%M%S)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find latest patch tag for this major.minor and increment
          LATEST=$(git tag -l "v${MAJOR_MINOR}.*" --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            PATCH=0
          else
            PATCH=$(echo "$LATEST" | sed "s/^v${MAJOR_MINOR}\.//")
            PATCH=$((PATCH + 1))
          fi

          echo "version=${MAJOR_MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Build docs export
        run: |
          node scripts/build-docs-export.js \
            --version "${{ steps.version.outputs.version }}" \
            --commit-sha "${{ github.sha }}" \
            --branch "${{ github.ref_name }}" \
            --include-images

      - name: Report build summary
        run: |
          echo "## Docs Export Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ inputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"

          TARBALL_SIZE=$(stat -c%s dist/guardrails-docs.tar.gz 2>/dev/null || stat -f%z dist/guardrails-docs.tar.gz)
          echo "| Tarball size | $(numfmt --to=iec ${TARBALL_SIZE} 2>/dev/null || echo "${TARBALL_SIZE} bytes") |" >> "$GITHUB_STEP_SUMMARY"

      - name: Tag release
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created tag $TAG"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: guardrails-docs-${{ steps.version.outputs.version }}
          path: dist/guardrails-docs.tar.gz
          retention-days: 30

    outputs:
      version: ${{ steps.version.outputs.version }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJson(
          inputs.environment == 'all' && '["development","staging","production"]' ||
          inputs.environment && format('["{0}"]', inputs.environment) ||
          '["development"]'
          ) }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: guardrails-docs-${{ needs.build.outputs.version }}

      - name: Select role ARN
        id: role
        run: |
          case "${{ matrix.target }}" in
            production)  echo "arn=${{ secrets.AWS_ROLE_ARN_PROD }}" >> "$GITHUB_OUTPUT" ;;
            staging)     echo "arn=${{ secrets.AWS_ROLE_ARN_STG }}"  >> "$GITHUB_OUTPUT" ;;
            development) echo "arn=${{ secrets.AWS_ROLE_ARN_DEV }}"  >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.role.outputs.arn }}
          aws-region: us-east-2

      - name: Upload to S3 (versioned)
        env:
          BUCKET: turbot-mod-repository-${{ matrix.target }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          aws s3 cp guardrails-docs.tar.gz \
            "s3://${BUCKET}/docs/${VERSION}/guardrails-docs.tar.gz"

      - name: Upload to S3 (latest)
        env:
          BUCKET: turbot-mod-repository-${{ matrix.target }}
        run: |
          aws s3 cp guardrails-docs.tar.gz \
            "s3://${BUCKET}/docs/latest/guardrails-docs.tar.gz"

      - name: Prune old versions (keep last 5)
        env:
          BUCKET: turbot-mod-repository-${{ matrix.target }}
        run: |
          # List all version prefixes under docs/, excluding "latest/"
          VERSIONS=$(aws s3api list-objects-v2 \
            --bucket "${BUCKET}" \
            --prefix "docs/" \
            --delimiter "/" \
            --query "CommonPrefixes[].Prefix" \
            --output text | tr '\t' '\n' | grep -v 'latest' | sort -r)

          COUNT=0
          for PREFIX in ${VERSIONS}; do
            COUNT=$((COUNT + 1))
            if [ "${COUNT}" -gt 5 ]; then
              echo "Deleting old version: ${PREFIX}"
              aws s3 rm "s3://${BUCKET}/${PREFIX}" --recursive
            fi
          done

          echo "Kept $([ ${COUNT} -le 5 ] && echo ${COUNT} || echo 5) versions, deleted $([ ${COUNT} -gt 5 ] && echo $((COUNT - 5)) || echo 0)"
