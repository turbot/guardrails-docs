AWSTemplateFormatVersion: "2010-09-09"
Description: >
  IAM role for GitHub Actions OIDC authentication.
  Allows the guardrails-docs repo to upload docs exports to the registry S3 bucket.
  Deploy this stack in each registry account (dev, staging, production).

Parameters:
  GitHubOrg:
    Type: String
    Default: turbot
    Description: GitHub organization name

  GitHubRepo:
    Type: String
    Default: guardrails-docs
    Description: GitHub repository name

  GitHubOrg2:
    Type: String
    Default: turbotio
    Description: Second GitHub organization name

  GitHubRepo2:
    Type: String
    Default: turbot.com
    Description: Second GitHub repository name

  S3BucketName:
    Type: String
    AllowedValues:
      - turbot-mod-repository-development
      - turbot-mod-repository-staging
      - turbot-mod-repository-production
    Description: Registry S3 bucket name for this environment

  CreateOIDCProvider:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: >
      Set to true ONLY if this account does not already have a GitHub OIDC provider.
      Most accounts that use GitHub Actions already have one. Check IAM > Identity providers first.

Conditions:
  ShouldCreateOIDCProvider: !Equals [!Ref CreateOIDCProvider, "true"]
  IsDev: !Equals [!Ref S3BucketName, turbot-mod-repository-development]
  IsStg: !Equals [!Ref S3BucketName, turbot-mod-repository-staging]

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        # GitHub Actions OIDC thumbprint (AWS validates via root CA, this is a placeholder requirement)
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  DocsExportRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: guardrails-docs-export
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - ShouldCreateOIDCProvider
                - !Ref GitHubOIDCProvider
                - !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  - !Sub repo:${GitHubOrg}/${GitHubRepo}:*
                  - !Sub repo:${GitHubOrg2}/${GitHubRepo2}:*
      Policies:
        - PolicyName: docs-export-s3-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource:
                  - !Sub arn:aws:s3:::${S3BucketName}/docs/*
                  - !Sub arn:aws:s3:::${S3BucketName}/policy-packs/*
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${S3BucketName}
                Condition:
                  StringLike:
                    s3:prefix:
                      - "docs/*"
                      - "policy-packs/*"

Outputs:
  RoleArn:
    Description: IAM role ARN — add this as a GitHub Actions secret
    Value: !GetAtt DocsExportRole.Arn

  GitHubSecretName:
    Description: Store the RoleArn under this GitHub secret name
    Value: !If
      - IsDev
      - AWS_ROLE_ARN_DEV
      - !If
        - IsStg
        - AWS_ROLE_ARN_STG
        - AWS_ROLE_ARN_PROD
